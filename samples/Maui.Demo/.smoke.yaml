# Smoke flow consumed by the `demo-smoke` skill.
# See .claude/skills/demo-smoke/SKILL.md for the schema.

name: Maui.Demo
display_name: Bee MAUI Demo

prerequisites:
  - id: server
    cwd: samples/QuickStart.Server
    cmd: dotnet run --configuration Release --no-build
    ready_when: "Now listening on"
    timeout_seconds: 30

launch:
  app_name: Bee MAUI Demo
  # Debug 構建路徑（Release-mode trim 砍 XmlSerializer 反射，目前 demo 強制走 Debug；
  # 詳細見 .claude/rules/maui.md 與 samples/Maui.Demo/README.md）
  bundle_path: samples/Maui.Demo/bin/Debug/net10.0-maccatalyst/maccatalyst-arm64/Bee MAUI Demo.app

flow:
  - step: take initial screenshot
    action: screenshot
    expect_text:
      - "Bee MAUI demo"
      - "Endpoint"
      - "Connect"

  - step: click Connect
    action: click
    target: { label: "Connect" }
    wait_after_seconds: 4
    expect_text:
      - "Login"
      - "Sign in"
      - "User ID"
      - "Password"

  - step: click Sign in
    action: click
    target: { label: "Sign in" }
    wait_after_seconds: 6
    expect_text:
      - "Employee"
      - "Alice Chen"
      - "Bob Liu"
      - "Carol Wang"

  - step: list-only screenshot
    action: screenshot
    save_as: maui-demo-employee-list.png

  # Tap Alice's row to verify the master form populates from GetData round-trip.
  # 端到端跑 Avalonia.Demo 時挖到 ReloadListAsync 沒帶 sys_rowid → TryGetRowId
  # 永遠失敗 → row tap 等於沒動作。MAUI 端有同樣的洞，本來 smoke 沒覆蓋這步
  # 所以一直沒被發現；補進來避免回歸。
  - step: tap Alice row
    action: click
    target: { label: "Alice Chen" }
    wait_after_seconds: 3
    expect_text:
      - "Alice Chen"
      - "Employee ID"
      - "Hire Date"

  - step: final screenshot
    action: screenshot
    save_as: maui-demo-employee-detail.png

teardown:
  kill_app: true
  kill_prerequisites: true
