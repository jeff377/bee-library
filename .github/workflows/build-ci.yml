name: Build CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.slnx'
      - 'Directory.Build.props'
      - '.github/workflows/build-ci.yml'
      - 'SonarQube.Analysis.xml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.slnx'
      - 'Directory.Build.props'
      - 'SonarQube.Analysis.xml'
      - '.github/workflows/build-ci.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: BeeTest_Password123!
        ports:
          - 1433:1433

      postgresql:
        image: postgres:17
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: common
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4.3.1
      with:
        dotnet-version: 10.0.x

    - name: Setup Java (for SonarScanner)
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4.8.0
      with:
        distribution: zulu
        java-version: '17'

    - name: Cache SonarCloud packages
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Install SonarScanner for .NET
      run: dotnet tool install --global dotnet-sonarscanner

    - name: Install sqlcmd
      run: |
        curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc > /dev/null
        curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list > /dev/null
        sudo apt-get update
        sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
        echo "/opt/mssql-tools18/bin" >> $GITHUB_PATH

    - name: Wait for SQL Server
      env:
        SA_PASSWORD: BeeTest_Password123!
      run: |
        for i in {1..60}; do
          if /opt/mssql-tools18/bin/sqlcmd -S localhost,1433 -U sa -P "$SA_PASSWORD" -C -Q "SELECT 1" > /dev/null 2>&1; then
            echo "SQL Server ready after ${i} attempt(s)"
            exit 0
          fi
          sleep 2
        done
        echo "SQL Server did not become ready in time" >&2
        exit 1

    - name: Create test database
      env:
        SA_PASSWORD: BeeTest_Password123!
      run: /opt/mssql-tools18/bin/sqlcmd -S localhost,1433 -U sa -P "$SA_PASSWORD" -C -Q "IF DB_ID('common') IS NULL CREATE DATABASE common;"

    # Strict build（analyzer gate）：未經 SonarScanner 包覆，TreatWarningsAsErrors
    # 與 .editorconfig 的 analyzer 規則會真正擋 build。Sonar-wrapped build 會削弱
    # 這層保護，故獨立跑一次把關。
    - name: Strict build (analyzer gate)
      run: dotnet build Bee.Library.slnx --configuration Release

    - name: SonarScanner Begin
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        dotnet sonarscanner begin \
          /k:"jeff377_bee-library" \
          /o:"jeff377" \
          /d:sonar.token="$SONAR_TOKEN" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /s:"$GITHUB_WORKSPACE/SonarQube.Analysis.xml"

    - name: Build (for Sonar coverage)
      run: dotnet build Bee.Library.slnx --configuration Release --no-incremental

    - name: Test with coverage
      env:
        BEE_TEST_CONNSTR_SQLSERVER: "Server=localhost,1433;Database=common;User Id=sa;Password=BeeTest_Password123!;Encrypt=True;TrustServerCertificate=True;"
        BEE_TEST_CONNSTR_POSTGRESQL: "Host=localhost;Port=5432;Database=common;Username=testuser;Password=testpass"
        # SQLite is a pure driver with no service container — in-memory shared cache so
        # multiple connections see the same database (cache=shared) and there is no IO
        # to clean up between runs.
        BEE_TEST_CONNSTR_SQLITE: "Data Source=file:bee_test_sqlite?mode=memory&cache=shared"
      run: dotnet test Bee.Library.slnx --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage;Format=opencover"

    - name: SonarScanner End
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

    - name: Pack NuGet packages (驗證用，不推送)
      run: |
        dotnet pack src/Bee.Base/Bee.Base.csproj --configuration Release --output ./nupkgs --no-build
        dotnet pack src/Bee.Definition/Bee.Definition.csproj --configuration Release --output ./nupkgs --no-build
        dotnet pack src/Bee.ObjectCaching/Bee.ObjectCaching.csproj --configuration Release --output ./nupkgs --no-build
        dotnet pack src/Bee.Db/Bee.Db.csproj --configuration Release --output ./nupkgs --no-build
        dotnet pack src/Bee.Business/Bee.Business.csproj --configuration Release --output ./nupkgs --no-build
        dotnet pack src/Bee.Api.Client/Bee.Api.Client.csproj --configuration Release --output ./nupkgs --no-build
        dotnet pack src/Bee.Api.Contracts/Bee.Api.Contracts.csproj --configuration Release --output ./nupkgs --no-build
        dotnet pack src/Bee.Api.Core/Bee.Api.Core.csproj --configuration Release --output ./nupkgs --no-build
        dotnet pack src/Bee.Api.AspNetCore/Bee.Api.AspNetCore.csproj --configuration Release --output ./nupkgs --no-build
        dotnet pack src/Bee.Repository.Abstractions/Bee.Repository.Abstractions.csproj --configuration Release --output ./nupkgs --no-build
        dotnet pack src/Bee.Repository/Bee.Repository.csproj --configuration Release --output ./nupkgs --no-build
