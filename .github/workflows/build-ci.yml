name: Build CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore Bee.UI.Core.slnx

    - name: Build
      run: dotnet build src/Bee.UI.Core/Bee.UI.Core.csproj --configuration Release --no-restore

    - name: Pack NuGet package (verify only)
      run: dotnet pack src/Bee.UI.Core/Bee.UI.Core.csproj --configuration Release --output ./nupkgs --no-build
