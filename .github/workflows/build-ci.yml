name: Build CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore Bee.Library.slnx

    - name: Build all projects
      run: |
        dotnet build src/Bee.Core/Bee.Core.csproj --configuration Release --no-restore
        dotnet build src/Bee.Definition/Bee.Definition.csproj --configuration Release --no-restore
        dotnet build src/Bee.ObjectCaching/Bee.ObjectCaching.csproj --configuration Release --no-restore
        dotnet build src/Bee.Db/Bee.Db.csproj --configuration Release --no-restore
        dotnet build src/Bee.Business/Bee.Business.csproj --configuration Release --no-restore
        dotnet build src/Bee.Api.Client/Bee.Api.Client.csproj --configuration Release --no-restore
        dotnet build src/Bee.Api.Core/Bee.Api.Core.csproj --configuration Release --no-restore
        dotnet build src/Bee.Api.AspNetCore/Bee.Api.AspNetCore.csproj --configuration Release --no-restore
        dotnet build src/Bee.Api.Contracts/Bee.Api.Contracts.csproj --configuration Release --no-restore
        dotnet build src/Bee.Repository.Abstractions/Bee.Repository.Abstractions.csproj --configuration Release --no-restore
        dotnet build src/Bee.Repository/Bee.Repository.csproj --configuration Release --no-restore

    - name: Pack NuGet packages (驗證用，不推送)
      run: |
        dotnet pack src/Bee.Core/Bee.Core.csproj --configuration Release --output ./nupkgs --no-build
        dotnet pack src/Bee.Definition/Bee.Definition.csproj --configuration Release --output ./nupkgs --no-build
        dotnet pack src/Bee.ObjectCaching/Bee.ObjectCaching.csproj --configuration Release --output ./nupkgs --no-build
        dotnet pack src/Bee.Db/Bee.Db.csproj --configuration Release --output ./nupkgs --no-build
        dotnet pack src/Bee.Business/Bee.Business.csproj --configuration Release --output ./nupkgs --no-build
        dotnet pack src/Bee.Api.Client/Bee.Api.Client.csproj --configuration Release --output ./nupkgs --no-build
        dotnet pack src/Bee.Api.Core/Bee.Api.Core.csproj --configuration Release --output ./nupkgs --no-build
        dotnet pack src/Bee.Api.AspNetCore/Bee.Api.AspNetCore.csproj --configuration Release --output ./nupkgs --no-build
        dotnet pack src/Bee.Api.Contracts/Bee.Api.Contracts.csproj --configuration Release --output ./nupkgs --no-build
        dotnet pack src/Bee.Repository.Abstractions/Bee.Repository.Abstractions.csproj --configuration Release --output ./nupkgs --no-build
        dotnet pack src/Bee.Repository/Bee.Repository.csproj --configuration Release --output ./nupkgs --no-build

    - name: Run tests
      run: dotnet test Bee.Library.slnx --configuration Release --no-restore
