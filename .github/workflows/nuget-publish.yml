name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v*'  # 只有推送 tag（例如 v1.2.3）時才會觸發

jobs:
  publish:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          6.0.x

    - name: Add MSBuild to PATH (for .NET Framework)
      uses: microsoft/setup-msbuild@v1.3

    - name: Restore dependencies
      run: dotnet restore

    - name: Build only needed projects
      run: |
        dotnet build src/Bee.Core/Bee.Core.csproj --configuration Release --no-restore
        dotnet build src/Bee.Definition/Bee.Definition.csproj --configuration Release --no-restore
        dotnet build src/Bee.ObjectCaching/Bee.ObjectCaching.csproj --configuration Release --no-restore
        dotnet build src/Bee.Db/Bee.Db.csproj --configuration Release --no-restore
        dotnet build src/Bee.Business/Bee.Business.csproj --configuration Release --no-restore
        dotnet build src/Bee.Api.Client/Bee.Api.Client.csproj --configuration Release --no-restore
        dotnet build src/Bee.Api.Core/Bee.Api.Core.csproj --configuration Release --no-restore
        dotnet build src/Bee.Api.AspNetCore/Bee.Api.AspNetCore.csproj --configuration Release --no-restore
        dotnet build src/Bee.Api.Contracts/Bee.Api.Contracts.csproj --configuration Release --no-restore
        dotnet build src/Bee.Repository.Abstractions/Bee.Repository.Abstractions.csproj --configuration Release --no-restore
        dotnet build src/Bee.Repository/Bee.Repository.csproj --configuration Release --no-restore

    - name: Pack all NuGet projects
      run: |
        dotnet pack src/Bee.Core/Bee.Core.csproj --configuration Release --output ./nupkgs
        dotnet pack src/Bee.Definition/Bee.Definition.csproj --configuration Release --output ./nupkgs
        dotnet pack src/Bee.ObjectCaching/Bee.ObjectCaching.csproj --configuration Release --output ./nupkgs
        dotnet pack src/Bee.Db/Bee.Db.csproj --configuration Release --output ./nupkgs
        dotnet pack src/Bee.Business/Bee.Business.csproj --configuration Release --output ./nupkgs
        dotnet pack src/Bee.Api.Client/Bee.Api.Client.csproj --configuration Release --output ./nupkgs
        dotnet pack src/Bee.Api.Core/Bee.Api.Core.csproj --configuration Release --output ./nupkgs
        dotnet pack src/Bee.Api.AspNetCore/Bee.Api.AspNetCore.csproj --configuration Release --output ./nupkgs
        dotnet pack src/Bee.Api.Contracts/Bee.Api.Contracts.csproj --configuration Release --output ./nupkgs
        dotnet pack src/Bee.Repository.Abstractions/Bee.Repository.Abstractions.csproj --configuration Release --output ./nupkgs
        dotnet pack src/Bee.Repository/Bee.Repository.csproj --configuration Release --output ./nupkgs

    - name: Push to NuGet
      run: |
        Get-ChildItem -Path ./nupkgs -Filter *.*nupkg | ForEach-Object {
          dotnet nuget push $_.FullName --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        }

  release:
    needs: publish # 👈 確保發佈 NuGet 完成後才進行 Release
    runs-on: ubuntu-latest

    steps:
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          自動發佈 NuGet 套件：
          - Bee.Core
          - Bee.Definition
          - Bee.ObjectCaching
          - Bee.Db
          - Bee.Business
          - Bee.Api.Client
          - Bee.Api.Core
          - Bee.Api.AspNetCore
          - Bee.Api.Contracts
          - Bee.Repository.Abstractions
          - Bee.Repository

          如需安裝請至 NuGet.org 查詢對應版本。
