name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v*'  # 只有推送 tag（例如 v1.2.3）時才會觸發

jobs:
  publish:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Extract version from tag
      id: version
      run: |
        $tag = "${{ github.ref_name }}"
        $version = $tag.TrimStart('v')
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        Write-Host "Publishing version: $version"

    - name: Restore dependencies
      run: dotnet restore Bee.Library.slnx

    - name: Build all projects
      run: |
        $ErrorActionPreference = 'Stop'
        $ver = "${{ steps.version.outputs.VERSION }}"
        dotnet build src/Bee.Base/Bee.Base.csproj --configuration Release --no-restore /p:Version=$ver
        dotnet build src/Bee.Definition/Bee.Definition.csproj --configuration Release --no-restore /p:Version=$ver
        dotnet build src/Bee.ObjectCaching/Bee.ObjectCaching.csproj --configuration Release --no-restore /p:Version=$ver
        dotnet build src/Bee.Db/Bee.Db.csproj --configuration Release --no-restore /p:Version=$ver
        dotnet build src/Bee.Business/Bee.Business.csproj --configuration Release --no-restore /p:Version=$ver
        dotnet build src/Bee.Api.Client/Bee.Api.Client.csproj --configuration Release --no-restore /p:Version=$ver
        dotnet build src/Bee.Api.Core/Bee.Api.Core.csproj --configuration Release --no-restore /p:Version=$ver
        dotnet build src/Bee.Api.AspNetCore/Bee.Api.AspNetCore.csproj --configuration Release --no-restore /p:Version=$ver
        dotnet build src/Bee.Api.Contracts/Bee.Api.Contracts.csproj --configuration Release --no-restore /p:Version=$ver
        dotnet build src/Bee.Repository.Abstractions/Bee.Repository.Abstractions.csproj --configuration Release --no-restore /p:Version=$ver
        dotnet build src/Bee.Repository/Bee.Repository.csproj --configuration Release --no-restore /p:Version=$ver

    - name: Pack NuGet packages
      run: |
        $ErrorActionPreference = 'Stop'
        $ver = "${{ steps.version.outputs.VERSION }}"
        dotnet pack src/Bee.Base/Bee.Base.csproj --configuration Release --output ./nupkgs --no-build /p:Version=$ver
        dotnet pack src/Bee.Definition/Bee.Definition.csproj --configuration Release --output ./nupkgs --no-build /p:Version=$ver
        dotnet pack src/Bee.ObjectCaching/Bee.ObjectCaching.csproj --configuration Release --output ./nupkgs --no-build /p:Version=$ver
        dotnet pack src/Bee.Db/Bee.Db.csproj --configuration Release --output ./nupkgs --no-build /p:Version=$ver
        dotnet pack src/Bee.Business/Bee.Business.csproj --configuration Release --output ./nupkgs --no-build /p:Version=$ver
        dotnet pack src/Bee.Api.Client/Bee.Api.Client.csproj --configuration Release --output ./nupkgs --no-build /p:Version=$ver
        dotnet pack src/Bee.Api.Core/Bee.Api.Core.csproj --configuration Release --output ./nupkgs --no-build /p:Version=$ver
        dotnet pack src/Bee.Api.AspNetCore/Bee.Api.AspNetCore.csproj --configuration Release --output ./nupkgs --no-build /p:Version=$ver
        dotnet pack src/Bee.Api.Contracts/Bee.Api.Contracts.csproj --configuration Release --output ./nupkgs --no-build /p:Version=$ver
        dotnet pack src/Bee.Repository.Abstractions/Bee.Repository.Abstractions.csproj --configuration Release --output ./nupkgs --no-build /p:Version=$ver
        dotnet pack src/Bee.Repository/Bee.Repository.csproj --configuration Release --output ./nupkgs --no-build /p:Version=$ver

    - name: Push to NuGet
      run: |
        $ErrorActionPreference = 'Stop'
        Get-ChildItem -Path ./nupkgs -Filter *.nupkg | ForEach-Object {
          dotnet nuget push $_.FullName --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          if ($LASTEXITCODE -ne 0) { throw "Failed to push $($_.Name)" }
        }

  release:
    needs: publish  # 確保 NuGet 全數發佈成功後才建立 GitHub Release
    runs-on: ubuntu-latest

    steps:
    - name: Extract version from tag
      id: version
      run: |
        TAG="${{ github.ref_name }}"
        echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          自動發佈 NuGet 套件（版本：${{ steps.version.outputs.VERSION }}）：
          - Bee.Base
          - Bee.Definition
          - Bee.ObjectCaching
          - Bee.Db
          - Bee.Business
          - Bee.Api.Client
          - Bee.Api.Core
          - Bee.Api.AspNetCore
          - Bee.Api.Contracts
          - Bee.Repository.Abstractions
          - Bee.Repository

          如需安裝請至 NuGet.org 查詢對應版本。
