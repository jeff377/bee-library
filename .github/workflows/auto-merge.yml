name: Auto Merge

on:
  pull_request:
    types: [labeled]

jobs:
  auto-merge:
    if: |
      github.event.label.name == 'auto-merge' &&
      github.event.pull_request.user.login == 'jeff377' &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Auto merge
        env:
          GH_TOKEN: ${{ secrets.AUTOMERGE_PAT }}
          PR_NUMBER: ${{ github.event.number }}
        run: gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --squash --auto --delete-branch
