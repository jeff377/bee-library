# SonarCloud 掃描設定。
#
# 此檔由 .github/workflows/build-ci.yml 的 SonarScanner Begin step 透過
# `/s:./sonar-project.properties` 引用。
#
# 命令列保留的參數（不放此檔）：
#   /k:  專案 key
#   /o:  organization
#   /d:sonar.token  SONAR_TOKEN secret，避免進入版控
#
# 設計原則：與專案內檔案 / 規則綁定的設定放此檔，跟 repo 一起 PR review。
# 與帳號／組織通用的設定（quality profile、quality gate）留 SonarCloud UI。

sonar.host.url=https://sonarcloud.io

# 覆蓋率報告
sonar.cs.opencover.reportsPaths=**/TestResults/**/coverage.opencover.xml

# 不納入覆蓋率計算的目錄（測試與範例本身不需被覆蓋）
sonar.coverage.exclusions=tests/**,samples/**

# 排除「設計上對稱、繼承基底不同」的型別對的重複行偵測。
# 詳見 docs/plans/plan-symmetric-types-refactor.md
sonar.cpd.exclusions=src/Bee.Definition/Layouts/LayoutItem.cs,src/Bee.Definition/Layouts/LayoutColumn.cs
