name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
      with:
        dotnet-version: 10.0.x

    - name: Extract version from tag
      id: version
      run: |
        TAG="${{ github.ref_name }}"
        VERSION="${TAG#v}"
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Publishing version: $VERSION"

    - name: Restore dependencies
      run: dotnet restore Bee.UI.Core.slnx

    - name: Build
      run: dotnet build src/Bee.UI.Core/Bee.UI.Core.csproj --configuration Release --no-restore /p:Version=${{ steps.version.outputs.VERSION }}

    - name: Pack NuGet package
      run: dotnet pack src/Bee.UI.Core/Bee.UI.Core.csproj --configuration Release --output ./nupkgs --no-build /p:Version=${{ steps.version.outputs.VERSION }}

    - name: Push to NuGet
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: dotnet nuget push ./nupkgs/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Extract version from tag
      id: version
      run: |
        TAG="${{ github.ref_name }}"
        echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          NuGet package published (version: ${{ steps.version.outputs.VERSION }}):
          - Bee.UI.Core

          Install: `dotnet add package Bee.UI.Core --version ${{ steps.version.outputs.VERSION }}`
